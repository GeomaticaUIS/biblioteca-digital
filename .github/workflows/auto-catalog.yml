name: Auto-generar Catálogo

on:
  push:
    paths:
      - 'docs/**'  # Se ejecuta cuando cambias algo en la carpeta docs/
  workflow_dispatch:  # También permite ejecutarlo manualmente

jobs:
  update-catalog:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'
      
      - name: Generar catalog.json
        run: python3 generate_catalog.py
      
      - name: Verificar si hay cambios
        id: verify_diff
        run: |
          git diff --quiet catalog.json || echo "changed=true" >> $GITHUB_OUTPUT
      
      - name: Commit y push si hay cambios
        if: steps.verify_diff.outputs.changed == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add catalog.json
          git commit -m "🤖 Actualizar catálogo automáticamente"
          git push
```

### Paso 4: Hacer Commit

1. Baja hasta el final de la página
2. En "Commit message" escribe: `Agregar automatización de catálogo`
3. Click en **"Commit new file"**

## ✅ Verificar que se creó bien

Después de hacer commit, deberías ver en tu repositorio:
```
📁 .github
  └── 📁 workflows
       └── 📄 auto-catalog.yml
```

Puedes verificarlo navegando en tu repo o en:
`https://github.com/geomaticauis/biblioteca-digital/tree/main/.github/workflows`

## 🔧 Activar permisos (MUY IMPORTANTE)

Después de crear el archivo:

1. Ve a tu repo → **Settings** (pestaña arriba)
2. En el menú izquierdo → **Actions** → **General**
3. Baja hasta "Workflow permissions"
4. Selecciona: ⚪ **"Read and write permissions"**
5. ✅ Marca: **"Allow GitHub Actions to create and approve pull requests"**
6. Click **"Save"** abajo

## 🧪 Probar que funciona

1. Ve a tu repo → pestaña **"Actions"** (arriba)
2. Deberías ver "Auto-generar Catálogo" en la lista
3. Click en "Auto-generar Catálogo"
4. Click en **"Run workflow"** → **"Run workflow"**
5. Espera 1-2 minutos
6. Debería aparecer ✅ verde si todo salió bien


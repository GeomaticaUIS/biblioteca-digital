name: Auto-generar Catálogo

on:
  push:
    paths:
      - 'docs/**'
  workflow_dispatch:

jobs:
  update-catalog:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'
      
      - name: Generar catalog.json
        run: python3 generate_catalog.py
      
      - name: Verificar si hay cambios
        id: verify_diff
        run: |
          git diff --quiet catalog.json || echo "changed=true" >> $GITHUB_OUTPUT
      
      - name: Commit y push si hay cambios
        if: steps.verify_diff.outputs.changed == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add catalog.json
          git commit -m "🤖 Actualizar catálogo automáticamente"
          git push
